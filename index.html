<button onclick="triggerImport()" class="btn-s text-xs md:text-sm inline-flex items-center gap-1.5"><i class="fa-solid fa-file-import text-[10px]"></i><span class="hidden sm:inline">Импорт</span></button>
<button onclick="exportCSV()" class="btn-s text-xs md:text-sm inline-flex items-center gap-1.5" id="btnExport"><i class="fa-solid fa-file-export text-[10px]"></i><span class="hidden sm:inline">Экспорт</span></button>
<button onclick="clearAll()" class="btn-danger text-xs md:text-sm inline-flex items-center gap-1.5" id="btnClear" style="display:none"><i class="fa-solid fa-trash-can text-[10px]"></i><span class="hidden sm:inline">Очистить</span></button>
